<p-toast></p-toast>
<div class="grid">
    <div class="col-12">
        <div class="card">
            <h5>Configuración de Horarios (Administración)</h5>
            <p>Configura los horarios de apertura, cierre y la capacidad por bloque para cada día de la semana.</p>
            
            <div class="flex flex-column md:flex-row align-items-start md:align-items-center gap-3 mb-4 mt-4">
                <div class="w-full md:w-20rem">
                    <label class="block mb-2 font-bold">Seleccionar Sede:</label>
                    <p-dropdown [options]="branches" [(ngModel)]="selectedBranchId" optionLabel="name" optionValue="id" placeholder="Elige una sede..." (onChange)="onBranchSelect()" styleClass="w-full"></p-dropdown>
                </div>
            </div>

            <div *ngIf="loading" class="flex justify-content-center p-5">
                <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
            </div>

            <div *ngIf="!loading && configs.length > 0" class="fadein animation-duration-300">
                <p-table [value]="configs" styleClass="p-datatable-gridlines" responsiveLayout="scroll">
                    <ng-template pTemplate="header">
                        <tr>
                            <th style="width: 15%">Día</th>
                            <th style="width: 15%">Estado</th>
                            <th style="width: 20%">Apertura</th>
                            <th style="width: 20%">Cierre</th>
                            <th style="width: 15%">Duración (min)</th>
                            <th style="width: 15%">Cupos Base</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-config let-i="rowIndex">
                        <tr [ngClass]="{'bg-gray-50': !config.is_open}">
                            <td class="font-bold">
                                {{ getDayName(config.day_of_week) }}
                            </td>
                            <td>
                                <p-dropdown [options]="[{label:'Abierto', value:true},{label:'Cerrado', value:false}]" 
                                            [(ngModel)]="config.is_open"
                                            styleClass="w-full"></p-dropdown>
                            </td>
                            <td>
                                <input type="time" pInputText [(ngModel)]="config.open_time" [disabled]="!config.is_open" class="w-full" step="1800" />
                            </td>
                            <td>
                                <input type="time" pInputText [(ngModel)]="config.close_time" [disabled]="!config.is_open" class="w-full" step="1800" />
                            </td>
                            <td>
                                <p-inputNumber [(ngModel)]="config.slot_duration_minutes" [disabled]="!config.is_open" class="w-full" [showButtons]="true" [min]="30" [max]="180" [step]="15"></p-inputNumber>
                            </td>
                            <td>
                                <p-inputNumber [(ngModel)]="config.default_max_quota" [disabled]="!config.is_open" class="w-full" [showButtons]="true" [min]="1" [max]="500"></p-inputNumber>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>

                <div class="flex justify-content-end mt-4">
                    <button pButton pRipple label="Guardar Configuración" icon="pi pi-check" class="p-button-primary" (click)="saveConfigs()" [loading]="saving"></button>
                </div>
            </div>
            
            <div *ngIf="!loading && !selectedBranchId" class="text-center p-5 border-round bg-primary-reverse border-1 border-primary-100">
                <i class="pi pi-cog text-6xl text-primary-300 mb-3"></i>
                <h5 class="text-primary-700 m-0">Selecciona una sede para configurar sus horarios</h5>
            </div>
        </div>
    </div>
</div>

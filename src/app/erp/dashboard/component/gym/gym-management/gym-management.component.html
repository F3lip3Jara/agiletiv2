<div class="grid">
    <div class="col-12 admin-card">
        <div class="card">
            <p-toast></p-toast>
            
            <!-- Header con título y búsqueda -->
            <div class="admin-header">
                <h2 class="header-title">Administración de Gimnasios y Sedes</h2>
                <div class="header-actions">
                    <span class="p-input-icon-left">
                        <i class="pi pi-search"></i>
                        <input #searchInput pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar... (Ctrl+Q)" class="p-inputtext-sm"/>
                    </span>
                    <button pButton pRipple label="Nuevo Gimnasio" icon="pi pi-plus" class="p-button-success p-button-sm mr-2" (click)="openNewGym()"></button>
                    <button pButton pRipple label="Nueva Sede" icon="pi pi-plus" class="p-button-primary p-button-sm" (click)="openNewBranch()"></button>
                    <button pButton pRipple label="Exportar" icon="pi pi-upload" class="p-button-outlined p-button-sm" (click)="exportCSV()"></button>
                </div>
            </div>

            <!-- Tabla modernizada -->
            <div class="admin-table">
                <p-table #dt [value]="branches" 
                        [columns]="cols" 
                        styleClass="p-datatable-sm"
                        [tableStyle]="{'min-width': '50rem'}"
                        [paginator]="true" 
                        [rows]="10" 
                        [showCurrentPageReport]="true"
                        [globalFilterFields]="globalFilterFields"
                        [rowsPerPageOptions]="rowsPerPageOptions"
                        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
                        [scrollable]="true"
                        [loading]="loading"
                        responsiveLayout="scroll">
                    
                    <ng-template pTemplate="header">
                        <tr>
                            <th>ID</th>                      
                            <th>Gimnasio</th>
                            <th>Sede</th>
                            <th>Dirección</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </ng-template>
                    
                    <ng-template pTemplate="body" let-b>
                        <tr [ngClass]="{'selected-row': selectedRow?.id === b.id}">
                            <td>{{b.id}}</td>                    
                            <td>
                                <span class="font-medium">{{b.gym?.name}}</span>
                            </td>
                            <td>
                                <span class="font-medium">{{b.name}}</span>
                            </td>
                            <td>
                                <span class="text-color-secondary">{{b.address}}</span>
                            </td>
                            <td>
                                <p-tag [severity]="b.status ? 'success' : 'danger'" [value]="b.status ? 'Activo' : 'Inactivo'"></p-tag>
                            </td>                       
                            <td>
                                <div class="actions-column" (click)="onActionClick(b)">
                                    <p-splitButton 
                                        icon="pi pi-chevron-down" 
                                        [model]="actionItems"
                                        styleClass="p-button-text p-button-secondary"
                                        appendTo="body">
                                    </p-splitButton>
                                </div>
                            </td>
                        </tr>
                    </ng-template>
                    
                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td colspan="6">
                                <div class="empty-message">
                                    <i class="pi pi-folder-open"></i>
                                    <span>No se encontraron sedes registradas.</span>
                                </div>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>

            <!-- Componente de búsqueda -->
            <app-search-dialog 
                [(visible)]="showSearchDialog"
                [data]="branches"
                (searchValueChange)="onSearchValueChange($event)">
            </app-search-dialog>
        </div>
    </div>
</div>

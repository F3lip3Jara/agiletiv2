# Generado por Firebase CLI y optimizado para Angular 17/18+
name: Deploy to Firebase Hosting on merge
on:
    push:
        branches:
            - main

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
            # 1. Descargar el código del repositorio
            - name: Checkout del repositorio
              uses: actions/checkout@v5

            # 2. Configurar el entorno de Node.js (Aquí es donde va la versión)
            - name: Configurar Node.js 24
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "npm"

            # 3. Instalar dependencias ignorando conflictos de versiones
            - name: Instalar dependencias
              run: npm install --legacy-peer-deps

            # 4. Compilar el proyecto Angular
            - name: Build de Angular
              run: npm run build

            # 5. Desplegar en Firebase Hosting
            - name: Desplegar a Firebase
              uses: FirebaseExtended/action-hosting-deploy@v0
              with:
                  repoToken: ${{ secrets.GITHUB_TOKEN }}
                  # IMPORTANTE: Asegúrate de que este nombre coincida con el de tus Secrets en GitHub
                  firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OMS_ECOMMERCE }}
                  channelId: live
                  projectId: oms-ecommerce
